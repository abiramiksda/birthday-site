<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 🎂</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 3em;
      animation: glow 2s infinite alternate;
    }

    .name {
      font-size: 2em;
      margin-top: 10px;
      color: #ffe066;
    }

    .photo {
      margin-top: 20px;
    }

    .photo img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.7);
    }

    p {
      font-size: 1.3em;
      margin-top: 15px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4e50;
      cursor: pointer;
      font-size: 1em;
    }

    button:hover {
      background: #ff4e50;
      color: white;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 20px yellow; }
    }

    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎉 Happy Birthday 🎂</h1>

  <!-- 🔥 Personalized Name -->
  <div class="name"> DHANA 💖</div>

  <!-- 📸 Photo -->
  <div class="photo">
    <img src="my-image.JPG" alt="Birthday Person">
  </div>

  <!-- 💌 Message -->
  <p id="message">Click below for your special wish 🎁</p>

  <button onclick="showWish()">Show Surprise ✨</button>
</div>

<script>
  function showWish() {
    document.getElementById("message").innerHTML =
      "May your day be filled with love, laughter, and happiness 💖!! Happy Birthday, my dear sister 🎂🎉";
// 🎈 Balloons
    for (let i = 0; i < 12; i++) {
      let balloon = document.createElement("div");
      balloon.className = "balloon";
      balloon.style.left = Math.random() * window.innerWidth + "px";
      balloon.style.background = getColor();
      balloon.style.animationDuration = (4 + Math.random() * 3) + "s";
      document.body.appendChild(balloon);

      setTimeout(() => balloon.remove(), 6000);
    }
  }

  function getColor() {
    const colors = ["#ff4e50", "#fc913a", "#f9d423", "#24c6dc", "#5433ff"];
    return colors[Math.floor(Math.random() * colors.length)];
  }
</script>

</body>
</html>
